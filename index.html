<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Store</title>
  <style>body {
  font-family: Arial;
  text-align: center;
}

.slider {
  margin: 30px;
}

.products {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  width: 150px;
}

.card img {
  width: 100%;
  height: 100px;
  background: #ddd;
}

button {
  background: green;
  color: white;
  padding: 8px;
  border: none;
  cursor: pointer;
  
}
#page2{
display:none;
}
</style>
</head>
<body>

<h1>My Product Store</h1>
<div id="page1">
<!-- FORM -->
<div id="formBox">
  <h2>Enter Details</h2>
  <input type="text" id="name" placeholder="Your Name"><br>
  <input type="number" id="phone" placeholder="Phone Number"><br>
  <button onclick="saveData()">Save</button>
  <button type="button" onclick="view2()">store</button>
</div>
</div>
<div id="page2">
<!-- SLIDER 1 -->

<div class="slider">
  <h2>Slider 1</h2>
  <div class="products">
    
    <div class="card">
      <img src="/PencilBoxFilledMappedboys_open1_d09a35bd-c953-4593-a4a0-e954a731aa33.jpg">
      <p>Product 1</p>
      <button onclick="buyProduct('Product 1')">Buy</button>
    </div>

    <div class="card">
      <img src="/graph-copy-24-page-500x500.jpg">
      <p>Product 2</p>
      <button onclick="buyProduct('Product 2')">Buy</button>
    </div>

    <div class="card">
      <img src="/31SMca-BlML._AC_UF1000,1000_QL80_.jpg">
      <p>Product 3</p>
      <button onclick="buyProduct('Product 3')">Buy</button>
    </div>

  </div>
</div>

<!-- SLIDER 2 -->
<div class="slider">
  <h2>Slider 2</h2>
  <div class="products">
    
    <div class="card">
      <img src="img4.jpg">
      <p>Product 4</p>
      <button onclick="buyProduct('Product 4')">Buy</button>
    </div>

    <div class="card">
      <img src="img5.jpg">
      <p>Product 5</p>
      <button onclick="buyProduct('Product 5')">Buy</button>
    </div>

    <div class="card">
      <img src="img6.jpg">
      <p>Product 6</p>
      <button onclick="buyProduct('Product 6')">Buy</button>
    </div>

  </div>
</div>

<!-- SLIDER 3 -->
<div class="slider">
  <h2>Slider 3</h2>
  <div class="products">
    
    <div class="card">
      <img src="img7.jpg">
      <p>Product 7</p>
      <button onclick="buyProduct('Product 7')">Buy</button>
    </div>

    <div class="card">
      <img src="img8.jpg">
      <p>Product 8</p>
      <button onclick="buyProduct('Product 8')">Buy</button>
    </div>

    <div class="card">
      <img src="img9.jpg">
      <p>Product 9</p>
      <button onclick="buyProduct('Product 9')">Buy</button>
    </div>

  </div>
</div>
</div>
<script>let userData = {};

function saveData() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  userData.name = name;
  userData.phone = phone;

  alert("Data Saved!");
}

function buyProduct(productName) {

  if (!userData.name || !userData.phone) {
    alert("Please fill form first!");
    return;
  }

  let message = `Order Details:%0A
Name: ${userData.name}%0A
Phone: ${userData.phone}%0A
Product: ${productName}`;

  let whatsapp = `https://wa.me/+919311061345?text=${message}`;

  window.open(whatsapp, "_blank");
}
function view2(){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="block";

}
</script>
</body>
</html>
